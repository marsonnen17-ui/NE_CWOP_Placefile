name: Update NE CWOP Placefile

on:
  repository_dispatch:
      types: [trigger_5min]  # This listens for an external command
  workflow_dispatch: # Allows you to run it manually

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
       
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Script
      run: python Script_V2.py # Replace with your actual script file name

    - name: Commit and Push Placefile
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add CWOP_Full_ObsV1.txt
        git diff-index --quiet HEAD || git commit -m "Automated Placefile Update"
        git push
